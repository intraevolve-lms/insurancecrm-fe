name: Build and publish Docker image

on:
  push:
    branches: [main, master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full tag history — needed to compute the next patch version

      - name: Compute next version
        id: version
        run: |
          MAJOR_MINOR=$(tr -d '[:space:]' < VERSION)
          LAST_PATCH=$(git tag -l "v${MAJOR_MINOR}.*" | sed -E "s/^v${MAJOR_MINOR}\.([0-9]+)$/\1/" | sort -n | tail -1)
          if [ -z "$LAST_PATCH" ]; then NEXT_PATCH=0; else NEXT_PATCH=$((LAST_PATCH + 1)); fi
          VERSION="v${MAJOR_MINOR}.${NEXT_PATCH}"
          echo "Building $VERSION (major.minor from VERSION file, patch auto-incremented)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/intraevolve-lms/insuredindex-fe:latest
            ghcr.io/intraevolve-lms/insuredindex-fe:${{ steps.version.outputs.version }}

      - name: Tag this release in git
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routes (React Router) all resolve to index.html
    location / {
        try_files $uri /index.html;
    }

    # The built app always calls a relative /api/... path (see src/lib/axios.ts) — proxy it to
    # the backend container. "backend" here must match that container's service/host name in
    # whatever compose file or network this runs under; update it if that differs.
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
